services:
  tradingview-mcp:
    build: .
    image: mjasion/tradingview-mcp:latest
    container_name: tradingview-mcp
    ports:
      - "8080:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    labels:
      - autoheal=true
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python -c "import urllib.request, json; \
          r=urllib.request.Request('http://localhost:8000/mcp', method='POST', \
          headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'}, \
          data=json.dumps({'jsonrpc':'2.0','id':1,'method':'initialize','params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode()); \
          urllib.request.urlopen(r, timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
